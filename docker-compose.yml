services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reabilita}
      POSTGRES_USER: ${POSTGRES_USER:-reabilita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reabilita}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reabilita} -d ${POSTGRES_DB:-reabilita}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - reabilita

  backend:
    build:
      context: ./reabilita-backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-reabilita_backend.settings.dev}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-*}"
      DJANGO_USE_SQLITE: "false"
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@saude.com}
      POSTGRES_DB: ${POSTGRES_DB:-reabilita}
      POSTGRES_USER: ${POSTGRES_USER:-reabilita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reabilita}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RUN_SEED_DEV_USERS: ${RUN_SEED_DEV_USERS:-true}
      RUN_SEED_REFERENCIAS: ${RUN_SEED_REFERENCIAS:-false}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS:-30}
      DB_WAIT_INTERVAL_SECONDS: ${DB_WAIT_INTERVAL_SECONDS:-2}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - reabilita

  frontend:
    build:
      context: ./reabilita-frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - reabilita

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - reabilita

volumes:
  postgres_data:

networks:
  reabilita:
    driver: bridge
