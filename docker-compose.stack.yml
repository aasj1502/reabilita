version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reabilita
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS}"
      DJANGO_USE_SQLITE: "false"
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RUN_SEED_DEV_USERS: ${RUN_SEED_DEV_USERS}
      RUN_SEED_REFERENCIAS: ${RUN_SEED_REFERENCIAS}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS}
      DB_WAIT_INTERVAL_SECONDS: ${DB_WAIT_INTERVAL_SECONDS}
    ports:
      - target: 8000
        published: ${BACKEND_PORT}
        protocol: tcp
        mode: ingress
    networks:
      - reabilita
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - target: 80
        published: ${FRONTEND_PORT}
        protocol: tcp
        mode: ingress
    networks:
      - reabilita
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  postgres_data:

networks:
  reabilita:
    driver: overlay
